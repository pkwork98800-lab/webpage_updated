<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | FARATECH</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; }
        nav { background: #1a1a1a; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        nav a { color: #fff; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        nav .logo { font-weight: bold; color: #0096FF; font-size: 1.2rem; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .stat-card { background: #1a1a1a; padding: 2rem; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .stat-card h3 { color: #aaa; font-size: 1rem; margin-bottom: 1rem; }
        .stat-card .value { font-size: 3rem; font-weight: bold; color: #0096FF; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">FARATECH ADMIN</div>
        <div>
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/submissions">Submissions</a>
            <a href="/admin/logout" style="color: #ff4d4d;">Logout</a>
        </div>
    </nav>
    <div class="container">
        <h1>Welcome, Administrator</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Page Visits</h3>
                <div class="value">{{ visit_count }}</div>
            </div>
            <div class="stat-card">
                <h3>Total Form Submissions</h3>
                <div class="value">{{ submit_count }}</div>
            </div>
        </div>
    </div>
</body>
</html>
