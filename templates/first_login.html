<!DOCTYPE html>
<html>
<head>
    <title>First Time Setup | FARATECH</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .setup-box { background: #1a1a1a; padding: 2rem; border-radius: 10px; border: 1px solid #333; width: 400px; box-shadow: 0 0 20px rgba(0,150,255,0.2); }
        h2 { text-align: center; color: #0096FF; margin-bottom: 1rem; }
        p { text-align: center; color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
        input { width: 100%; padding: 0.7rem; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: #0096FF; border: none; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="setup-box">
        <h2>Security Verification</h2>
        <p>Please provide the secure pass-key to set your administrative password.</p>
        <form action="/admin/first-login" method="POST">
            <div class="form-group">
                <label>Security Pass-Key</label>
                <input type="password" name="pass_key" required>
            </div>
            <div class="form-group">
                <label>New Secure Password</label>
                <input type="password" name="new_password" required>
            </div>
            <button type="submit">Verify & Save</button>
        </form>
    </div>
</body>
</html>
